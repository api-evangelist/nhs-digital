components:
  parameters:
    CorrelationId:
      in: header
      name: X-Correlation-ID
      required: false
      description: 'A unique message identifier. We use this to trace the message if you raise an issue with our helpdesk.


        If provided, we recommend a GUID for uniqueness and convenience.


        This is mirrored back in the response headers.

        '
      schema:
        type: string
        example: b5bc6879-103e-4a78-975e-87e815c5da58
    BearerAuthorization:
      in: header
      name: Authorization
      description: 'An [OAuth 2.0 bearer token](https://digital.nhs.uk/developer/guides-and-documentation/security-and-authorisation#user-restricted-apis).

        '
      required: true
      schema:
        type: string
        format: ^Bearer\ [[:ascii:]]+$
        example: Bearer g1112R_ccQ1Ebbb4gtHBP1aaaNM
  securitySchemes:
    OAuth_Token:
      type: http
      scheme: bearer
